<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Wedding Invitation | Airi & Yushi</title>
    <meta name="description" content="三宅愛理 高橋優志 結婚式のWeb招待状" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wedding Invitation | Airi & Yushi" />
    <meta property="og:description" content="三宅愛理 高橋優志 結婚式のWeb招待状" />
    <meta property="og:image" content="./img/ogp.png" />
    <meta property="og:site_name" content="Wedding Invitation" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wedding Invitation | Airi & Yushi" />
    <meta name="twitter:description" content="三宅愛理 高橋優志 結婚式のWeb招待状" />
    <meta name="twitter:image" content="./img/ogp.png" />
    <link rel="icon" href="./img/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="./img/hero_deco.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="side-rail" aria-label="quick actions">
      <a class="side-rail__link" href="#rsvp">RSVP</a>
      <a class="side-rail__link side-rail__link--secondary" href="#venue">INFO</a>
    </aside>

    <div class="device-stage">
      <div class="device-frame">
        <div class="device-frame__speaker" aria-hidden="true"></div>
        <main id="app"></main>

        <iframe
          name="google-form-submit-frame"
          id="google-form-submit-frame"
          title="google form submit target"
          hidden
        ></iframe>

        <div class="mobile-actions" aria-label="quick actions">
          <a class="mobile-actions__link" href="#rsvp">RSVP</a>
          <a class="mobile-actions__link mobile-actions__link--secondary" href="#venue"
            >会場情報</a
          >
        </div>
      </div>
    </div>

    <template id="timeline-item-template">
      <li class="timeline__item reveal">
        <div class="timeline__time"></div>
        <div class="timeline__dot" aria-hidden="true"></div>
        <div class="timeline__body">
          <p class="timeline__label"></p>
          <p class="timeline__note"></p>
        </div>
      </li>
    </template>

    <template id="host-card-template">
      <article class="host-card reveal">
        <div class="host-card__avatar" aria-hidden="true"></div>
        <div class="host-card__meta">
          <p class="host-card__role"></p>
          <h3 class="host-card__name"></h3>
          <p class="host-card__message"></p>
        </div>
      </article>
    </template>

    <script src="./content.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
